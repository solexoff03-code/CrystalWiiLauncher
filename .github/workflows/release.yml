name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.*"
          modules: "qtmultimedia"

      - name: Update vcpkg and install dependencies
        run: |
          cd $env:VCPKG_INSTALLATION_ROOT
          git pull
          .\bootstrap-vcpkg.bat
          .\vcpkg.exe install sdl2:x64-windows nlohmann-json:x64-windows
        shell: pwsh

      - name: Configure CMake
        run: |
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release --parallel
        shell: pwsh

      - name: Deploy Qt runtime dependencies (windeployqt)
        run: |
          $exe = Get-ChildItem -Path build -Recurse -Filter "CrystalWiiLauncher.exe" | Select-Object -First 1
          windeployqt.exe $exe.FullName --release --no-translations
        shell: pwsh

      - name: Package into a zip
        run: |
          $exe = Get-ChildItem -Path build -Recurse -Filter "CrystalWiiLauncher.exe" | Select-Object -First 1
          $stageDir = "package/CrystalWiiLauncher"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item -Path "$($exe.DirectoryName)\*" -Destination $stageDir -Recurse -Force
          Copy-Item -Path "assets" -Destination "$stageDir\assets" -Recurse -Force
          Copy-Item -Path "README.md","LICENSE" -Destination $stageDir -Force
          Compress-Archive -Path $stageDir -DestinationPath "CrystalWiiLauncher-${{ github.ref_name }}-win64.zip"
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrystalWiiLauncher-windows
          path: CrystalWiiLauncher-*.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: CrystalWiiLauncher-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}